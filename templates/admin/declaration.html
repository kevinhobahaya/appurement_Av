{% extends 'admin/home.html' %}
{% load static %}
{% block content %}

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    /* PAGE */
    .form-page{
        min-height:100vh;
        width:100%;
        display:flex;
        justify-content:center;
        align-items:center;
        position:relative;
        padding:40px 20px;

        /* IMAGE BACKGROUND */
        background-image:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=1470&auto=format&fit=crop');

        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;
    }

    /* CENTER CONTAINER */
    .center-box{
        width:100%;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    /* FORM CARD */
    .form-container{
        width:100%;
        max-width:700px;
        background:rgba(255,255,255,0.97);
        padding:35px;
        border-radius:25px;
        box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .form-title{
        text-align:center;
        margin-bottom:25px;
        color:#0d6efd;
        font-weight:bold;
    }

    .form-control,
    .form-select{
        height:50px;
        border-radius:12px;
    }

    textarea.form-control{
        height:120px;
    }

    .btn-custom{
        height:50px;
        border-radius:12px;
        font-size:18px;
        font-weight:bold;
    }

    /* MOBILE */
    @media(max-width:576px){

        .form-page{
            padding:20px 10px;
        }

        .form-container{
            padding:25px;
        }

    }

</style>

<!-- PAGE -->
<div class="form-page">

    <!-- CENTER -->
    <div class="center-box">

        <!-- FORM -->
        <div class="form-container">

            <h2 class="form-title">
                Formulaire pour la declaration des marchandises 
            </h2>

            <form>

                <div class="row">

                    <!-- Produit -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Produit
                        </label>

                        <input 
                            type="text"
                            class="form-control"
                            placeholder="Entrez le nom du produit"
                        >

                    </div>

                    <!-- Prix -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Prix unitaire
                        </label>

                        <input 
                            type="number"
                            class="form-control"
                            placeholder="Entrez le prix unitaire"
                        >

                    </div>

                    <!-- qte -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Quantité
                        </label>

                        <input 
                            type="number"
                            class="form-control"
                            placeholder="Entrez la quantité"
                        >

                    </div>

                    <!-- STATUT -->
                    <!-- <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Statut
                        </label>

                        <select class="form-select">

                            <option>
                                En route
                            </option>

                            <option>
                                En attente
                            </option>

                            <option>
                                Livraison
                            </option>

                        </select>

                    </div> -->
                    <!-- poid -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            poids
                        </label>

                        <input 
                            type="number"
                            class="form-control"
                            placeholder="Entrez le poids"
                        >

                    </div>
                    <!-- position tarifaire -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            position tarifaire
                        </label>

                        <input 
                            type="number"
                            class="form-control"
                            placeholder="Entrez la position tarifaire"
                        >

                    </div>
                    <!-- bureau -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Bureau
                        </label>

                        <input 
                            type="text"
                            class="form-control"
                            placeholder="Entrez le bureau"
                        >

                    </div>
                    <!-- norme applicable -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Norme applicable
                        </label>

                        <input 
                            type="text"
                            class="form-control"
                            placeholder="Entrez la norme applicable"
                        >

                    </div>
                    <!-- numero e -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Numéro E
                        </label>

                        <input 
                            type="text"
                            class="form-control"
                            placeholder="Entrez le numéro E"
                        >

                    </div>
                    <!-- fob -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                           Fob
                        </label>

                        <input 
                            type="number"
                            class="form-control"
                            placeholder="Entrez le fob"
                        >

                    </div>
                    <!-- DESCRIPTION -->
                    <!-- <div class="col-12 mb-4">

                        <label class="form-label">
                            Description
                        </label>

                        <textarea 
                            class="form-control"
                            placeholder="Description du transport..."
                        ></textarea>

                    </div> -->

                </div>

                <!-- BUTTON -->
                <button class="btn btn-primary w-100 btn-custom">
                    Enregistrer
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
