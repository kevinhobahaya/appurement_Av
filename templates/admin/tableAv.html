{% extends 'admin/home.html' %}
{% load static %}
{% block content %}
<style>

/* ===== TABLE CARD ===== */
.table-card{
    background:white;
    border-radius:16px;
    padding:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

/* ===== FILTER BAR ===== */
.filter-bar{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

.filter-input, .filter-select{
    padding:10px 14px;
    border-radius:10px;
    border:1px solid #e5e7eb;
    outline:none;
    min-width:220px;
}

.filter-input:focus, .filter-select:focus{
    border-color:#2563eb;
}

/* ===== TABLE ===== */
.saas-table{
    width:100%;
    border-collapse:collapse;
}

.saas-table thead{
    background:#0f172a;
    color:white;
}

.saas-table th{
    padding:14px;
    text-align:left;
    font-size:14px;
}

.saas-table td{
    padding:14px;
    border-bottom:1px solid #eef2f7;
}

.saas-table tbody tr:hover{
    background:#f8fafc;
}

/* ===== BADGES ===== */
.badge-status{
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:600;
}

.en-route{ background:#dcfce7; color:#166534; }
.attente{ background:#fef9c3; color:#854d0e; }
.livraison{ background:#dbeafe; color:#1e40af; }

</style>

<div class="table-card">

<!-- FILTER BAR -->
<div class="filter-bar">

    <input type="text" id="searchInput" class="filter-input" placeholder="🔎 Rechercher camion, chauffeur...">

    <select id="statusFilter" class="filter-select">
        <option value="">Tous les statuts</option>
        <option value="En route">En route</option>
        <option value="En attente">En attente</option>
        <option value="Livraison">Livraison</option>
    </select>

</div>

<!-- TABLE -->
<table class="saas-table" id="dataTable">

    <thead>
        <tr>
            <th>Camion</th>
            <th>Chauffeur</th>
            <th>Destination</th>
            <th>Statut</th>
        </tr>
    </thead>

    <tbody>

      
        <tr>

            <td>kk</td>
            <td>item.chauffeur</td>
            <td> item.destination </td>

            <td>
                <span class="badge-status
                    {% if item.statut == 'En route' %}en-route{% endif %}
                    {% if item.statut == 'En attente' %}attente{% endif %}
                    {% if item.statut == 'Livraison' %}livraison{% endif %}
                ">
                     item.statut 
                </span>
            </td>

        </tr>
       

    </tbody>

</table>

</div>

<script>

/* ================= FILTER TABLE ================= */

const searchInput = document.getElementById("searchInput");
const statusFilter = document.getElementById("statusFilter");
const rows = document.querySelectorAll("#dataTable tbody tr");

function filterTable(){

    const searchValue = searchInput.value.toLowerCase();
    const statusValue = statusFilter.value;

    rows.forEach(row => {

        const text = row.innerText.toLowerCase();
        const status = row.querySelector(".badge-status").innerText.trim();

        const matchSearch = text.includes(searchValue);
        const matchStatus = statusValue === "" || status === statusValue;

        if(matchSearch && matchStatus){
            row.style.display = "";
        }else{
            row.style.display = "none";
        }

    });

}

searchInput.addEventListener("keyup", filterTable);
statusFilter.addEventListener("change", filterTable);

</script>

{% endblock %}
